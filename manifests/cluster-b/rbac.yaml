---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-monkey
  namespace: chaos
---
# chaos-monkey does NOT need in-cluster RBAC for Cluster A
# (it uses an external kubeconfig from a Secret).
# It may need to read its own namespace for debugging.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chaos-monkey
  namespace: chaos
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chaos-monkey
  namespace: chaos
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: chaos-monkey
subjects:
  - kind: ServiceAccount
    name: chaos-monkey
    namespace: chaos
