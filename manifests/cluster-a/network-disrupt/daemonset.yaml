apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: pumba
  namespace: victim
  labels:
    app: pumba
spec:
  selector:
    matchLabels:
      app: pumba
  template:
    metadata:
      labels:
        app: pumba
    spec:
      hostNetwork: true
      hostPID: true
      containers:
        - name: pumba
          image: alpine:latest
          command: ["sh", "-c", "apk add --no-cache iproute2 > /dev/null 2>&1 && sleep infinity"]
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      tolerations:
        - operator: Exists
