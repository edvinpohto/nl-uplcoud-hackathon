apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: chaos
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # Scrape health-checker on Cluster B (same cluster, ClusterIP)
      - job_name: 'health-checker'
        static_configs:
          - targets: ['health-checker.chaos.svc.cluster.local:9090']
        metrics_path: /metrics

      # Scrape chaos-monkey on Cluster B
      - job_name: 'chaos-monkey'
        static_configs:
          - targets: ['chaos-monkey.chaos.svc.cluster.local:8080']
        metrics_path: /metrics

      # Scrape Prometheus itself
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
